openapi: 3.1.0

info:
  title: Sentinel
  version: 1.0.0
  description: |
    Spending-card authorization service. Inbound authorization request
    from the card processor → idempotent decision → outbound webhook
    fan-out via SQS + Lambda. See
    [ARCHITECTURE.md](https://github.com/visi27/sentinel/blob/main/ARCHITECTURE.md)
    for the full architectural walkthrough.

    **Trust regimes**

    - **`POST /api/authorizations`** — HMAC-SHA256 signed by the card
      processor. The interactive console on this page intercepts requests
      to this endpoint and signs them for you using the
      `processor_signing_secret` configured at the bottom of the page.
    - **`/api/cards/*`** — `X-API-Key` header. Two virtual users:
      `admin` (full access) and `readonly` (GET only).
    - **`/health`** — unauthenticated.
  license:
    name: Sample — work-sample code, not for production use

servers:
  - url: http://localhost:8100
    description: Local development (default)

tags:
  - name: Health
  - name: Cards
    description: Card lifecycle (admin) and queries (readonly)
  - name: Authorizations
    description: Authorization decisioning (HMAC-signed inbound from the processor) and read-side queries

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      description: |
        Returns 200 if the kernel boots. Does **not** verify Postgres or
        Redis connectivity — those are separate readiness checks that
        production deployments would add.
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
              example: { status: ok }

  /api/cards:
    post:
      tags: [Cards]
      summary: Issue a new card
      description: |
        Creates a card in **Pending** state. A separate `POST .../activate`
        call is required before the card can authorize. Requires the
        `admin` API key (write).
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssueCardRequest' }
            example:
              cardholder_id: '01890d3a-3e95-7000-8000-1234567890ab'
              spending_limits:
                per_transaction: 50000
                daily: 200000
                monthly: 1000000
              initial_balance: 100000
              currency: USD
              allowed_merchant_categories: ['4121', '5812']
      responses:
        '201':
          description: Card created
          headers:
            Location:
              description: URL of the new card
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssueCardResponse' }
              example: { id: '01890d3a-3e95-7000-8000-abcdef012345' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/cards/{id}:
    get:
      tags: [Cards]
      summary: Get a card
      description: |
        Returns the full card projection. Requires `readonly` or `admin`.
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: Card found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CardView' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/cards/{id}/activate:
    post:
      tags: [Cards]
      summary: Activate a card
      description: |
        Transitions Pending → Active. Idempotent in spirit but not in code:
        activating an already-Active card returns `409 INVALID_STATE_TRANSITION`.
        Requires `admin`.
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '204': { description: Card activated; no body }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/StateConflict' }

  /api/cards/{id}/suspend:
    post:
      tags: [Cards]
      summary: Suspend an Active card
      description: |
        Transitions Active → Suspended. Requires `admin`.
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuspendCardRequest' }
            example: { reason: 'Cardholder reported lost' }
      responses:
        '204': { description: Card suspended; no body }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/StateConflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/cards/{id}/authorizations:
    get:
      tags: [Authorizations]
      summary: List authorizations for a card
      description: |
        Returns every authorization (approved AND declined) recorded
        against the card, newest first. Read-side query that bypasses the
        aggregate — see ARCHITECTURE.md §11 for the ORM/DBAL split.
      security:
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/CardId'
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        '200':
          description: Page of authorizations
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthorizationListView' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/authorizations:
    post:
      tags: [Authorizations]
      summary: Create an authorization (HMAC-signed, from the card processor)
      description: |
        The card processor POSTs here for every authorization request.
        Sentinel evaluates the request against the card's rules and
        returns an approve/decline decision synchronously — the
        processor expects the body within the 200 ms budget.

        Despite the HMAC-style signing this is **not** a webhook (no
        fire-and-forget); it's an RPC-shaped decisioning endpoint.

        **Signature**: `X-Processor-Signature: t=<unix>,v1=<hex-hmac>`
        over the canonical message `<unix>.<request-body>`. The
        `processor_signing_secret` is the shared secret. Replay window
        is 5 minutes.

        **Try it from this page**: the JS interceptor signs the request
        for you using the secret configured at the top of the page.
        Outside of this page, see the curl example in README.md.

        **Idempotency**: requests are keyed by `processor_auth_id` (or
        the `Idempotency-Key` header if present). A repeat returns the
        original response byte-for-byte.
      security:
        - processorSignature: []
      parameters:
        - in: header
          name: X-Processor-Signature
          required: true
          schema: { type: string }
          example: 't=1747000000,v1=deadbeef…'
        - in: header
          name: Idempotency-Key
          required: false
          schema: { type: string }
          description: Overrides the default key (`processor_auth_id`)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthorizationRequest' }
            example:
              processor_auth_id: 'auth_abc123'
              card_id: '01890d3a-3e95-7000-8000-abcdef012345'
              amount: 5000
              currency: USD
              merchant:
                name: Uber
                category_code: '4121'
                location:
                  city: Boston
                  region: MA
                  country: US
              requested_at: '2026-05-15T12:34:56Z'
      responses:
        '200':
          description: Decision returned (approve OR decline — both are 200)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthorizationDecision' }
              examples:
                approved:
                  summary: Approved
                  value:
                    authorization_id: '01890d3b-4f12-7000-8000-fedcba987654'
                    status: approved
                    decline_reason: null
                declined:
                  summary: Declined (insufficient funds)
                  value:
                    authorization_id: '01890d3b-4f12-7000-8000-fedcba987654'
                    status: declined
                    decline_reason: INSUFFICIENT_FUNDS
        '401':
          description: Signature missing, malformed, stale, or mismatch
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              example: { error: { code: INVALID_SIGNATURE, message: 'signature mismatch' } }
        '422': { $ref: '#/components/responses/ValidationError' }

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Two virtual users:
        - `dev_admin_key` → ROLE_ADMIN (full access)
        - `dev_readonly_key` → ROLE_READONLY (GET only)
    processorSignature:
      type: apiKey
      in: header
      name: X-Processor-Signature
      description: |
        HMAC-SHA256, format `t=<unix>,v1=<hex>` over `<unix>.<body>`.
        This page signs requests for you using the secret you configure
        at the top — do not paste a real signature into this field.

  parameters:
    CardId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid, example: '01890d3a-3e95-7000-8000-abcdef012345' }

  responses:
    Unauthenticated:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but lacks the required role
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { error: { code: CARD_NOT_FOUND, message: 'no card with id …' } }
    ValidationError:
      description: Request shape or values are invalid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { error: { code: VALIDATION_ERROR, message: "field 'amount' must be a non-negative integer" } }
    StateConflict:
      description: Invalid state transition for this aggregate
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { error: { code: INVALID_STATE_TRANSITION, message: 'cannot activate a card in status Active' } }

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok] }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable, machine-readable code
              examples:
                - VALIDATION_ERROR
                - INVALID_SIGNATURE
                - INVALID_STATE_TRANSITION
                - CARD_NOT_FOUND
            message: { type: string }

    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          minimum: 0
          description: Amount in the currency's minor units (cents for USD)
        currency:
          type: string
          enum: [USD]

    SpendingLimits:
      type: object
      required: [per_transaction, daily, monthly]
      properties:
        per_transaction: { $ref: '#/components/schemas/Money' }
        daily: { $ref: '#/components/schemas/Money' }
        monthly: { $ref: '#/components/schemas/Money' }

    MerchantLocation:
      type: object
      required: [city, region, country]
      properties:
        city: { type: string }
        region: { type: string }
        country: { type: string, description: ISO 3166-1 alpha-2 }

    Merchant:
      type: object
      required: [name, category_code]
      properties:
        name: { type: string }
        category_code:
          type: string
          description: ISO 18245 Merchant Category Code (4 digits)
          pattern: '^[0-9]{4}$'
        location:
          oneOf:
            - $ref: '#/components/schemas/MerchantLocation'
            - type: 'null'

    CardStatus:
      type: string
      enum: [pending, active, suspended, closed]

    CardView:
      type: object
      required:
        [id, cardholder_id, status, spending_limits, available_balance,
         daily_spend, monthly_spend, allowed_merchant_categories, issued_at,
         activated_at, closed_at]
      properties:
        id: { type: string, format: uuid }
        cardholder_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/CardStatus' }
        spending_limits: { $ref: '#/components/schemas/SpendingLimits' }
        available_balance: { $ref: '#/components/schemas/Money' }
        daily_spend: { $ref: '#/components/schemas/Money' }
        monthly_spend: { $ref: '#/components/schemas/Money' }
        allowed_merchant_categories:
          type: array
          items: { type: string, pattern: '^[0-9]{4}$' }
        issued_at: { type: string, format: date-time }
        activated_at: { oneOf: [{ type: string, format: date-time }, { type: 'null' }] }
        closed_at: { oneOf: [{ type: string, format: date-time }, { type: 'null' }] }

    AuthorizationStatus:
      type: string
      enum: [pending, approved, declined, reversed]

    DeclineReason:
      type: string
      description: |
        Closed set of reasons a request can be declined. Notes:
        - `CARD_NOT_ACTIVE` is also returned when the `card_id` does not exist;
          the processor cannot distinguish "not found" from "not active", by
          design (no card-enumeration side-channel).
        - `DUPLICATE_AUTHORIZATION` is reserved for a future use; live retries
          of the same `processor_auth_id` are handled by the idempotency
          layer and return the original decision verbatim.
      enum:
        - CARD_NOT_ACTIVE
        - INSUFFICIENT_FUNDS
        - EXCEEDS_PER_TRANSACTION_LIMIT
        - EXCEEDS_DAILY_LIMIT
        - EXCEEDS_MONTHLY_LIMIT
        - MERCHANT_CATEGORY_BLOCKED
        - DUPLICATE_AUTHORIZATION

    AuthorizationView:
      type: object
      required:
        [id, card_id, processor_auth_id, amount, merchant, status,
         decline_reason, requested_at, decided_at, reversed_at]
      properties:
        id: { type: string, format: uuid }
        card_id: { type: string, format: uuid }
        processor_auth_id: { type: string }
        amount: { $ref: '#/components/schemas/Money' }
        merchant:
          type: object
          required: [name, category_code]
          properties:
            name: { type: string }
            category_code: { type: string }
        status: { $ref: '#/components/schemas/AuthorizationStatus' }
        decline_reason:
          oneOf:
            - $ref: '#/components/schemas/DeclineReason'
            - type: 'null'
        requested_at: { type: string, format: date-time }
        decided_at: { oneOf: [{ type: string, format: date-time }, { type: 'null' }] }
        reversed_at: { oneOf: [{ type: string, format: date-time }, { type: 'null' }] }

    AuthorizationListView:
      type: object
      required: [items, page, per_page, total_items, total_pages]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/AuthorizationView' }
        page: { type: integer, minimum: 1 }
        per_page: { type: integer, minimum: 1 }
        total_items: { type: integer, minimum: 0 }
        total_pages: { type: integer, minimum: 0 }

    AuthorizationDecision:
      type: object
      required: [authorization_id, status, decline_reason]
      properties:
        authorization_id: { type: string, format: uuid }
        status: { type: string, enum: [approved, declined] }
        decline_reason:
          oneOf:
            - $ref: '#/components/schemas/DeclineReason'
            - type: 'null'

    IssueCardRequest:
      type: object
      required:
        [cardholder_id, spending_limits, initial_balance, currency,
         allowed_merchant_categories]
      properties:
        cardholder_id: { type: string, format: uuid }
        spending_limits:
          type: object
          required: [per_transaction, daily, monthly]
          properties:
            per_transaction: { type: integer, minimum: 1 }
            daily: { type: integer, minimum: 1 }
            monthly: { type: integer, minimum: 1 }
        initial_balance: { type: integer, minimum: 0 }
        currency: { type: string, enum: [USD] }
        allowed_merchant_categories:
          type: array
          minItems: 1
          items: { type: string, pattern: '^[0-9]{4}$' }

    IssueCardResponse:
      type: object
      required: [id]
      properties:
        id: { type: string, format: uuid }

    SuspendCardRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }

    AuthorizationRequest:
      type: object
      required:
        [processor_auth_id, card_id, amount, currency, merchant, requested_at]
      properties:
        processor_auth_id:
          type: string
          description: Processor-owned idempotency key
        card_id: { type: string, format: uuid }
        amount: { type: integer, minimum: 1 }
        currency: { type: string, enum: [USD] }
        merchant: { $ref: '#/components/schemas/Merchant' }
        requested_at: { type: string, format: date-time }
