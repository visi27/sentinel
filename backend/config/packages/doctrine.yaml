doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true

        # outbox_events, webhook_deliveries, and messenger_messages are
        # managed outside the ORM (DBAL inserts only); exclude them from
        # schema-diff comparisons.
        schema_filter: '~^(?!outbox_events|webhook_deliveries|messenger_messages)~'

        # Custom types map domain value objects to native Postgres columns.
        types:
            card_id: App\Infrastructure\Persistence\Doctrine\Type\CardIdType
            cardholder_id: App\Infrastructure\Persistence\Doctrine\Type\CardholderIdType
            authorization_id: App\Infrastructure\Persistence\Doctrine\Type\AuthorizationIdType
            merchant: App\Infrastructure\Persistence\Doctrine\Type\MerchantType
            merchant_category_code_list: App\Infrastructure\Persistence\Doctrine\Type\MerchantCategoryCodeListType
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                # XML mapping keeps the domain layer free of Doctrine attributes.
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\Domain'
                alias: App

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
