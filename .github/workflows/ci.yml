name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: cards
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d cards"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/cards?serverVersion=16&charset=utf8"
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, ctype, iconv
          tools: composer:v2
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Warm dev cache (for PHPStan container analysis)
        run: APP_ENV=dev php bin/console cache:clear

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Code style
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Create test database
        run: php bin/console doctrine:database:create --if-not-exists --no-interaction

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Tests
        run: vendor/bin/phpunit --coverage-text
