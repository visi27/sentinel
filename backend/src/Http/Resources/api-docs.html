<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sentinel · API Reference</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; }

    /* Sticky settings banner so reviewers see the API-key + HMAC-secret
       inputs before they hit Send. The values are pulled from .env's
       dev defaults; reviewers can override here without touching the
       container. */
    #settings {
      position: sticky; top: 0; z-index: 1000;
      background: #1e1e24; color: #eee;
      padding: 12px 16px;
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      border-bottom: 1px solid #333;
    }
    #settings strong { color: #fff; margin-right: 8px; }
    #settings label { display: flex; flex-direction: column; gap: 2px; }
    #settings span { font-size: 11px; color: #999; }
    #settings input {
      background: #2a2a32; color: #fff;
      border: 1px solid #444; border-radius: 4px;
      padding: 6px 8px; font: inherit; min-width: 220px;
    }
    #settings .hint {
      color: #888; font-size: 11px;
      margin-left: auto; max-width: 380px; text-align: right;
    }
  </style>
</head>
<body>
  <div id="settings">
    <strong>Sentinel</strong>
    <label>
      <span>X-API-Key (used by /api/cards/*)</span>
      <input id="api-key-input" type="text" value="dev_admin_key" />
    </label>
    <label>
      <span>Processor signing secret (HMAC)</span>
      <input id="processor-secret-input" type="text" value="dev_processor_signing_secret" />
    </label>
    <div class="hint">
      Requests to <code>POST /api/authorizations</code> are signed
      automatically with the secret above.<br />
      Requests to <code>/api/cards/*</code> use the API key above as
      the <code>X-API-Key</code> header.
    </div>
  </div>

  <div id="app"></div>

  <script>
    // ── HMAC signing interceptor ──────────────────────────────────────
    //
    // Scalar (and most OpenAPI consoles) build requests through the
    // standard fetch() API. We monkey-patch fetch once on load:
    //
    // - Requests to POST /api/authorizations get a fresh timestamp,
    //   HMAC-SHA256(secret, `${ts}.${body}`), and the
    //   X-Processor-Signature header. The body is signed AS SENT — any
    //   edits the reviewer makes in the console are included.
    // - Requests to /api/cards/* get the X-API-Key header from the
    //   settings input.
    //
    // The interceptor is a development convenience for this page only;
    // production consumers compute signatures server-side.

    const apiKeyInput = document.getElementById("api-key-input");
    const secretInput = document.getElementById("processor-secret-input");

    async function hmacHex(secret, message) {
      const enc = new TextEncoder();
      const key = await crypto.subtle.importKey(
        "raw",
        enc.encode(secret),
        { name: "HMAC", hash: "SHA-256" },
        false,
        ["sign"],
      );
      const sig = await crypto.subtle.sign("HMAC", key, enc.encode(message));
      return Array.from(new Uint8Array(sig))
        .map((b) => b.toString(16).padStart(2, "0"))
        .join("");
    }

    // Normalize fetch() into { url, method, headers, body } so we can
    // rewrite uniformly regardless of whether the caller passed
    // fetch(url, init) (most code) or fetch(Request) (recent Scalar).
    // When the caller passes a Request, init.body is undefined even
    // though the Request itself carries one — we have to clone() and
    // read it explicitly, otherwise the signature gets computed for
    // an empty string and the body never reaches the server.
    async function normalizeRequest(input, init) {
      if (input instanceof Request) {
        const method = input.method.toUpperCase();
        const hasBody = method !== "GET" && method !== "HEAD";
        return {
          url: input.url,
          method,
          headers: new Headers(input.headers),
          body: hasBody ? await input.clone().text() : null,
        };
      }
      const method = (init.method || "GET").toUpperCase();
      let body = null;
      if (init.body != null && method !== "GET" && method !== "HEAD") {
        body = typeof init.body === "string"
          ? init.body
          : await new Response(init.body).text();
      }
      return {
        url: String(input),
        method,
        headers: new Headers(init.headers || {}),
        body,
      };
    }

    const originalFetch = window.fetch.bind(window);
    window.fetch = async (input, init = {}) => {
      const req = await normalizeRequest(input, init);

      let modified = false;

      // POST /api/authorizations → sign body with HMAC.
      if (req.url.endsWith("/api/authorizations") && req.method === "POST") {
        const ts = Math.floor(Date.now() / 1000);
        const sig = await hmacHex(secretInput.value, `${ts}.${req.body ?? ""}`);
        req.headers.set("X-Processor-Signature", `t=${ts},v1=${sig}`);
        modified = true;
      }
      // /api/cards/* → attach API key from the settings input. Skip
      // documented requests (openapi.yaml, /docs itself) and the
      // health endpoint.
      else if (req.url.includes("/api/cards")) {
        if (apiKeyInput.value) req.headers.set("X-API-Key", apiKeyInput.value);
        modified = true;
      }

      if (!modified) return originalFetch(input, init);

      // Forward via init.headers override only — preserves the original
      // Request's body, signal, credentials, mode, etc. Reconstructing
      // the request from explicit fields would drop AbortSignal and
      // break Scalar's downstream response handling with a TypeError.
      return originalFetch(input, { ...init, headers: req.headers });
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
  <script>
    // Disable the "Ask AI" agent panel. On localhost, Scalar enables it
    // by default with 10 free messages — fine for evaluation traffic
    // but pointless noise for a reviewer evaluating a code sample.
    Scalar.createApiReference("#app", {
      url: "/openapi.yaml",
      agent: { disabled: true },
    });
  </script>
</body>
</html>
