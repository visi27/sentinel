security:
    providers:
        # Two virtual users (admin / readonly) are resolved by the
        # ApiKeyAuthenticator's UserBadge callable rather than by this
        # provider, but Symfony's firewall config still expects one named.
        users_in_memory:
            memory: null

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Inbound webhooks authenticate via HMAC signature, not API key.
        # The controller calls ProcessorWebhookSignatureVerifier directly.
        webhook:
            pattern: ^/api/webhooks/
            stateless: true
            security: false

        api:
            pattern: ^/api/
            stateless: true
            provider: users_in_memory
            custom_authenticators:
                - App\Http\Security\ApiKeyAuthenticator

    # An admin can do anything a read-only user can.
    role_hierarchy:
        ROLE_ADMIN: ROLE_READONLY

    access_control:
        - { path: ^/health$, roles: PUBLIC_ACCESS }
        # The OpenAPI spec and interactive console are publicly readable.
        # The spec contains no secrets; the console renders it client-side.
        - { path: ^/(docs|openapi\.yaml)$, roles: PUBLIC_ACCESS }
        - { path: ^/api/webhooks/, roles: PUBLIC_ACCESS }
        - { path: ^/api/cards, methods: [GET], roles: ROLE_READONLY }
        - { path: ^/api/cards, methods: [POST], roles: ROLE_ADMIN }
